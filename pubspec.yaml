name: evs_remote
description: "Управление компьютерами в сети — Wake-on-LAN, мониторинг состояния, голосовой ввод EVS."
publish_to: "none"
# Согласовано с тегами GitHub Releases (v0.1.0). В CI versionName берётся из
# тега (см. release.yml), поэтому проверка обновлений сравнивает одно и то же.
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  http: ^1.2.1
  web_socket_channel: ^3.0.1
  cupertino_icons: ^1.0.8
  record: ^7.1.1
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1
  # Обновление приложения из GitHub Releases (проверка версии, скачивание, установка APK)
  package_info_plus: ^8.1.0
  path_provider: ^2.1.4
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "assets/icon/icon_background.png"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 24
  # iOS запрещает прозрачность в иконке и сам скругляет углы (маска-суперэллипс).
  # Мастер нарисован скруглённым (rx=224) — прозрачные углы заливаем тёмным
  # фоном контейнера. Его радиус ≈ маске iOS, поэтому заливка попадает точно
  # в обрезаемую зону и на готовой иконке не видна.
  remove_alpha_ios: true
  background_color_ios: "#0B1120"
